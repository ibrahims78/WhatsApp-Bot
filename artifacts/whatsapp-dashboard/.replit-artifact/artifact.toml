kind = "web"
previewPath = "/"
title = "واتساب بوت - لوحة التحكم"
version = "1.0.0"
id = "artifacts/whatsapp-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23097

[services.development]
run = "pnpm --filter @workspace/whatsapp-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whatsapp-dashboard", "run", "build" ]
publicDir = "artifacts/whatsapp-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23097"
BASE_PATH = "/"
