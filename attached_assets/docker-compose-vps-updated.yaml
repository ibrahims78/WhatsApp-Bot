version: '3.8'

services:

  # ============================================================
  # الخدمات الأصلية - ProTeach Infrastructure
  # ============================================================

  # قاعدة البيانات (PostgreSQL 16) - خاصة بـ n8n
  db:
    image: postgres:16-alpine
    container_name: proteach-db
    restart: always
    environment:
      - POSTGRES_USER=n8n_user
      - POSTGRES_PASSWORD=VMware2@
      - POSTGRES_DB=n8n_database
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - n8n-network

  # محرك الأتمتة (n8n)
  n8n:
    image: n8nio/n8n:latest
    container_name: proteach-n8n
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=VMware2@
      - N8N_HOST=n8n.sidawin8n.cfd
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.sidawin8n.cfd/
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      - db
    networks:
      - n8n-network

  # بوابة الإدارة (Nginx Proxy Manager)
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: proteach-npm
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./npm_data:/data
      - ./npm_letsencrypt:/etc/letsencrypt
    networks:
      - n8n-network

  # واجهة الإدارة الرسومية (Portainer)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: proteach-portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data
    networks:
      - n8n-network

  # ============================================================
  # خدمات WhatsApp Manager - بيئة التطوير (Development)
  # المصدر: https://github.com/ibrahims78/WhatsApp-Bot
  # مجلد الكود: ./whatsapp-manager  (git clone في نفس المجلد)
  # ============================================================

  # قاعدة بيانات WhatsApp Manager (مستقلة عن n8n)
  wa-db:
    image: postgres:15-alpine
    container_name: proteach-wa-db
    restart: always
    environment:
      - POSTGRES_USER=wauser
      - POSTGRES_PASSWORD=WaPass2026!
      - POSTGRES_DB=whatsapp_manager_db
    volumes:
      - ./wa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wauser -d whatsapp_manager_db"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - n8n-network

  # API Server - WhatsApp Manager (بيئة التطوير)
  wa-api:
    build:
      context: ./whatsapp-manager
      dockerfile: Dockerfile.api.dev
    image: whatsapp-manager-api-dev:latest
    container_name: proteach-wa-api
    restart: always
    environment:
      - DATABASE_URL=postgres://wauser:WaPass2026!@wa-db:5432/whatsapp_manager_db
      - PORT=8080
      - JWT_SECRET=wa_jwt_replace_with_64char_random_secret_here_abcdefghijklmnop
      - NODE_ENV=development
    volumes:
      # تثبيت الكود المباشر للتطوير السريع بدون إعادة بناء الصورة
      - ./whatsapp-manager/lib:/app/lib
      - ./whatsapp-manager/artifacts/api-server/src:/app/artifacts/api-server/src
      # حفظ جلسات WhatsApp في مجلد ثابت خارج الحاوية
      - ./wa_tokens:/app/artifacts/api-server/tokens
      - ./wa_public:/app/artifacts/api-server/public
      # حماية node_modules المثبتة داخل Docker من الاستبدال بالـ mount
      - wa_api_nm_root:/app/node_modules
      - wa_api_nm_db:/app/lib/db/node_modules
      - wa_api_nm_zod:/app/lib/api-zod/node_modules
      - wa_api_nm_client:/app/lib/api-client-react/node_modules
      - wa_api_nm_spec:/app/lib/api-spec/node_modules
    depends_on:
      wa-db:
        condition: service_healthy
    networks:
      - n8n-network

  # Dashboard (الواجهة الرسومية) - WhatsApp Manager (بيئة التطوير)
  wa-dashboard:
    build:
      context: ./whatsapp-manager
      dockerfile: Dockerfile.dashboard.dev
    image: whatsapp-manager-dashboard-dev:latest
    container_name: proteach-wa-dashboard
    restart: always
    environment:
      - BASE_PATH=/
      - PORT=5000
      - NODE_ENV=development
      # يوجّه Vite proxy إلى wa-api داخل الشبكة (ليس localhost)
      - VITE_API_TARGET=http://wa-api:8080
    volumes:
      # تثبيت الكود للـ HMR (Hot Module Replacement)
      - ./whatsapp-manager/artifacts/whatsapp-dashboard/src:/app/artifacts/whatsapp-dashboard/src
      - ./whatsapp-manager/lib:/app/lib
      # حماية node_modules
      - wa_dash_nm_root:/app/node_modules
      - wa_dash_nm_db:/app/lib/db/node_modules
      - wa_dash_nm_zod:/app/lib/api-zod/node_modules
      - wa_dash_nm_client:/app/lib/api-client-react/node_modules
      - wa_dash_nm_spec:/app/lib/api-spec/node_modules
    depends_on:
      - wa-api
    networks:
      - n8n-network

# ============================================================
# التخزين الدائم (Volumes)
# ============================================================
volumes:
  # node_modules معزولة للـ API
  wa_api_nm_root:
  wa_api_nm_db:
  wa_api_nm_zod:
  wa_api_nm_client:
  wa_api_nm_spec:
  # node_modules معزولة للـ Dashboard
  wa_dash_nm_root:
  wa_dash_nm_db:
  wa_dash_nm_zod:
  wa_dash_nm_client:
  wa_dash_nm_spec:

# ============================================================
# الشبكة المشتركة
# ============================================================
networks:
  n8n-network:
    driver: bridge
