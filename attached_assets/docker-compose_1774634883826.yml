services:
  app:
    image: staff_health_2026-app:latest
    # Removed fixed container_name to avoid conflicts
    ports:
      - "${APP_PORT:-5001}:5001"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-hruser}:${POSTGRES_PASSWORD:-hrpassword}@db:5432/${POSTGRES_DB:-hr_db}
      - NODE_ENV=production
      - PORT=5001
      - SESSION_SECRET=${SESSION_SECRET:-SH_Secure_2026_Fixed_Key}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    # Removed fixed container_name to avoid conflicts
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hruser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hrpassword}
      - POSTGRES_DB=${POSTGRES_DB:-hr_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hruser} -d ${POSTGRES_DB:-hr_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local